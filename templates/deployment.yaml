apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-db
  labels:
    app: my-db
spec:
  replicas: {{ .Values.database.replicaCount }}
  selector:
    matchLabels:
      app: my-db
  template:
    metadata:
      labels:
        app: my-db
    spec:
      containers:
      - name: postgres-db
        image: "{{ .Values.database.image.repository }}:{{ .Values.database.image.tag }}"
        ports:
        - containerPort: 5432
        envFrom:
        - secretRef:
            name: postgres-secret
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-store
  labels:
    app: python-store
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: python-store
  template:
    metadata:
      labels:
        app: python-store
    spec:
      containers:
      - name: python-store
        image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
        imagePullPolicy: "{{ .Values.frontend.image.pullPolicy }}"
        ports:
        - containerPort: 5000
        envFrom:
        - secretRef:
            name: postgres-secret
        readinessProbe:
          httpGet:
            path: /ready
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /healthz
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
 






    
